apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app

    spec:
      containers:
      - name: my-app
        image: 828360850570.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: my-app-service

spec:
  type: LoadBalancer
  selector:
    app: my-app

  ports:
  - port: 80
    targetPort: 5000
